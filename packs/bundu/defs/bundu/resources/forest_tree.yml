# @pack-gen model=models/nature/tree.yml
id: forest_tree
defaultVariant: base

tile:
    footprint:
        - "###"
        - "#X#"
        - "###"
    spillover: 0

# Fade canopy when the local player stands under the art.
occlusion:
    state: occluded
    radius: 1.5
alphaFadeMs: 200

# World zIndex bands (player = 1): layered canopy stack above the player.
# layer0/1 sit with mid foliage; layer2/3 are the upper canopy (occlusion fades these).
parts:
    layer0:
        zIndex: 11
        shadow: 1.2
    layer1:
        zIndex: 10
        shadow: 1.2
    layer2:
        zIndex: 12
        shadow: 1.5
    layer3:
        zIndex: 13
        shadow: 1.9

variants:
    base:
        layer0: bundu/decoration/forest/forest_tree_1_0.png
        layer1: bundu/decoration/forest/forest_tree_1_1.png
        layer2: bundu/decoration/forest/forest_tree_1_2.png
        layer3: bundu/decoration/forest/forest_tree_1_3.png

states:
    occluded:
        default: false
        values:
            "true":
                parts:
                    layer2: { alpha: 0.35 }
                    layer3: { alpha: 0.35 }

animations:
    hit:
        preset: hit
        parts: [layer0, layer1, layer2]
    sway:
        preset: tree_sway
        parts: [layer1, layer2, layer3]
        data: { distance: 0.1, tilt: 2, duration: 7500, stagger: 500 }
        autoplay: true
---
score: 5
exclusive: true
multipliers:
    pickaxe: 1
level: 0
regen_speed: 5
quantity: 40
loot_table: forest_tree
