# @pack-gen model=models/nature/tree.yml
id: resource:bundu:forest_tree
defaultVariant: base

tile:
    footprint:
        - "###"
        - "#X#"
        - "###"
    spillover: 0

# Fade canopy when the local player stands under the art.
occlusion:
    state: occluded
    radius: 1.5
alphaFadeMs: 200

# World zIndex bands (player = 1): layered canopy stack above the player.
# layer0/1 sit with mid foliage; layer2/3 are the upper canopy (occlusion fades these).
parts:
    trunk:
        zIndex: 11
        shadow: 1.2
    branches:
        zIndex: 10
        shadow: 1.2
    leaves_1_1:
        zIndex: 12
        shadow: 1.5
    leaves_1_2:
        zIndex: 13
        shadow: 1.9
    leaves_1_3:
        zIndex: 14
        shadow: 1.9
    leaves_2_1:
        zIndex: 15
        shadow: 1.9
    leaves_2_2:
        zIndex: 16
        shadow: 1.9
    leaves_2_3:
        zIndex: 17
        shadow: 1.9

variants:
    base:
        trunk: bundu/resource/tree/forest/trunk.png
        branches: bundu/resource/tree/forest/1/branches.svg
        leaves_1_1: bundu/resource/tree/forest/1/leaves_1_1.svg
        leaves_1_2: bundu/resource/tree/forest/1/leaves_1_2.svg
        leaves_1_3: bundu/resource/tree/forest/1/leaves_1_3.svg
        leaves_2_1: bundu/resource/tree/forest/1/leaves_2_1.svg
        leaves_2_2: bundu/resource/tree/forest/1/leaves_2_2.svg
        leaves_2_3: bundu/resource/tree/forest/1/leaves_2_3.svg

states:
    occluded:
        default: false
        values:
            "true":
                parts:
                    leaves_1_1: { alpha: 0.35 }
                    leaves_1_2: { alpha: 0.35 }
                    leaves_1_3: { alpha: 0.35 }
                    leaves_2_1: { alpha: 0.35 }
                    leaves_2_2: { alpha: 0.35 }
                    leaves_2_3: { alpha: 0.35 }

animations:
    hit:
        preset: hit
        parts: [trunk, branches, leaves_1_1, leaves_1_2, leaves_1_3, leaves_2_1, leaves_2_2, leaves_2_3]
    sway:
        preset: tree_sway
        parts: [branches, leaves_1_1, leaves_1_2, leaves_1_3, leaves_2_1, leaves_2_2, leaves_2_3]
        data: { distance: 0.1, tilt: 2, duration: 7500, stagger: 0 }
        autoplay: true
---
score: 5
exclusive: true
multipliers:
    pickaxe: 1
level: 0
regen_speed: 5
quantity: 40
loot_table: forest_tree
