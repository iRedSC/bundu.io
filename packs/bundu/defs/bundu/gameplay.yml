animal_ai:
  think_interval_ms: 250
  path_limit: 96
  aggro_check_interval_ms: 2500
  aggro_lost_ms: 1000
  aggro_drop_chance_percent: 35
  medium_aggro_range_ratio: 0.5
  wander_min_ms: 1500
  wander_variance_ms: 2500
  flee_ms: 1500
  clearance_step_tiles: 0.25
  # Abandon a destination after this long with almost no net movement.
  stuck_timeout_ms: 750

hunger:
  moving_multiplier: 1.2
  attacking_multiplier: 1.1
  # Flat damage each vitals tick while already at 0 (not the tick that hits 0).
  starvation_damage: 2

# Interval (ms) between applying warmth / nourishment / hydration / oxygen.
# Each period, the full attribute value is applied once (not a rate divisor).
vitals:
  tick_period_ms: 2000

temperature:
  freeze_damage: 2
  overheat_damage: 3

thirst:
  dehydration_damage: 2

air:
  drown_damage: 4

day_cycle:
  periods:
    morning:
      duration_ms: 180000
      attributes:
        temperature.warmth:
          op: add
          value: -4
    day:
      duration_ms: 420000
      attributes:
        temperature.warmth:
          op: add
          value: -2
    evening:
      duration_ms: 180000
      attributes:
        temperature.warmth:
          op: add
          value: -6
    night:
      duration_ms: 420000
      attributes:
        temperature.warmth:
          op: add
          value: -10

health:
  regen_interval_ms: 5000
  rotting_damage_multiplier: 2
  natural_limit: 100

spikes:
  attack_interval_ms: 1000
  animal_damage_multiplier: 0.125
  # >1 = spiked walls/doors take more damage (easier to break)
  damage_multiplier_to_spike: 1.5

rotting:
  damage_per_second: 3
  claim_weapon: silver_sword

items:
  pickup_radius: 55
  drop_distance: 80
  drop_pickup_delay_ms: 500
  ground_collision_radius: 12

render_distance:
  x: 2200
  y: 1250

player:
  spawn_tile: { x: 75, y: 75 }
  collision_radius: 42
  physics_speed: 10
  base_attributes:
    attack.damage: 1
    attack.origin: 30
    attack.reach: 70
    attack.sweep: 50
    attack.speed: 2
    health.max: 200
    health.regen_amount: 10
    hunger.nourishment: -1
    hunger.max: 200
    hunger.cancel_regen_below: 25
    hunger.cancel_regen_above: 175
    eating.movement_speed_multiplier: 1
    movement.speed: 16
    placement.reach: 200
    temperature.max: 200
    temperature.warmth: 0
    temperature.insulation: 0
    temperature.cancel_regen_below: 25
    temperature.cancel_regen_above: 175
    thirst.hydration: -1
    thirst.max: 100
    thirst.cancel_regen_below: 25
    thirst.cancel_regen_above: 0
    air.oxygen: 0
    air.max: 100
    air.cancel_regen_below: 25
    air.cancel_regen_above: 175
  initial_health: 100
  initial_stats:
    hunger: { value: 100, min: 0, max: 200 }
    temperature: { value: 100, min: 0, max: 200 }
    thirst: { value: 100, min: 0, max: 100 }
    air: { value: 100, min: 0, max: 100 }
  attack_movement_multiplier: 0.7
  attack_movement_duration_ms: 500
  blocking_movement_multiplier: 0.6
  hunger_saturation_limit: 200
  hunger_normal_limit: 100

worldgen:
  resource_count: 450
  border_padding_tiles: 3
  placement_attempt_multiplier: 8
  resources: [forest_tree, stone, copper, silver, cobalt]
  animals: [bear, deer, ram, elephant, komodo_dragon, alligator, bee]
  starter_structure:
    id: wood_wall
    x: 77
    y: 75
    rotation: 0
