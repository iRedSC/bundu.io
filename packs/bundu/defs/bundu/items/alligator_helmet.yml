texture: bundu/item/equipment/alligator_helmet.svg
extends: item_type:bundu:helmet
---
type: bundu:helmet
whenHelmet:
    "@s":
        attributes:
            health.defense:
                op: add
                value: 5
    "@s[flag=in_water]":
        attributes:
            movement.speed:
                op: multiply
                value: 1.25
            health.defense:
                op: add
                value: 4
            temperature.insulation.down:
                op: add
                value: 0.75
