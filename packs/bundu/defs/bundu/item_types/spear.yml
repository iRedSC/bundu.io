displays:
    hand:
        rotation: 180
        x: 0
        y: 0.5
        scale: 1.4
    inventory:
        rotation: 45
        scale: 1.6
        x: 8
        y: -8
---
function: "main_hand"
onEquip:
    "@s":
        lockItem:
            slots: [mainhand]
            lock: [unequip]
            for: 10000
whenEquipped:
    "@s":
        attributes:
            "movement.speed":
                op: "multiply"
                value: 0.8
            "attack.reach":
                op: "add"
                value: 15
            "attack.sweep":
                op: "add"
                value: 30
            "attack.origin":
                op: "add"
                value: 45
