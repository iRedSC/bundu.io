kind: solid
color: "#2a462b"
fill: forest_blobs
ambient:
    firefly:
        periods: [night]
        interval_ms: [420, 900]
        size: [12, 34]
        alpha: [0.95, 0.55]
        lifetime: [1800, 3400]
        speed: [3, 12]
        gravity: -8
        gravity_x: 0
        friction: 0.6
        # Hover in place — do not stream with snow/dust wind.
        wind: false
        tint: "#eaff9c"
        blend_mode: add
        # Soft blink; reads clearly once above the sky multiply.
        alpha_fade_in: 0.35
        alpha_hold: 0.55
        # Above sky multiply (200) so night tint doesn't crush the glow.
        z_index: 202
---
model: grass
