kind: ocean
color: "#1e6fa0"
# Short nearshore blend — ponds read as small inland water, not open sea.
fade_tiles: 2
caustic_tint:
    a: "#1a6aaa"
    b: "#5eb8ff"
textures:
    caustics: bundu/effect/pond_caustics.jpg
    displace: bundu/effect/pond_displace.png
    ripple_idle: bundu/effect/pond_ripple.png
    ripple_move: bundu/effect/pond_ripple_move.png
    foam: bundu/effect/pond_foam.svg
    sparkle: bundu/effect/pond_sparkle.svg
---
model: pond
whenOccupied:
  occupationType: center
  "*":
    flags:
      - in_water
    attributes:
      movement.speed: { op: multiply, value: 0.75 }
      attack.reach: { op: multiply, value: 0.75 }
      air.oxygen: { op: add, value: -5 }
      temperature.warmth: { op: add, value: -3 }
      thirst.hydration: { op: add, value: 10 }
