kind: solid
color: "#c9b07a"
fill: sand_bands
footsteps: true
trail:
    amount: [1, 2]
    speed: [50, 130]
    lifetime: [250, 480]
    size: [15, 20]
    end_size: 1
    spread: 1.3
    friction: 3.2
    gravity: 90
    color_jitter: 0.22
    spacing: 12
ambient:
    steam:
        interval_ms: [380, 850]
        size: [750, 1000]
        # Screen-blend mist was essentially invisible at ~0.045.
        alpha: [0.16, 0.06]
        lifetime: [2800, 4800]
        speed: [6, 18]
        gravity: -4
        gravity_x: 2
        friction: 0.2
        tint: "#ffffff"
        blend_mode: screen
        alpha_fade_in: 0.15
        alpha_hold: 0.55
        end_size: 700
---
model: island
