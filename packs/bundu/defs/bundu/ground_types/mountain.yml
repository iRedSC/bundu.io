kind: solid
color: "#6a6e68"
fill: solid_blobs
ambient:
    snow:
        # Same blow as winter, lower density.
        interval_ms: [220, 520]
        count: 2
        size: [20, 40]
        alpha: [0.62, 0.3]
        lifetime: [2000, 3800]
        speed: [70, 140]
        spread: 0.55
        gravity: 8
        gravity_x: 28
        friction: 0.1
        tint: "#e8eef2"
        alpha_fade_in: 0.08
        alpha_hold: 0.6
---
model: mountain
whenOccupied:
  occupationType: center
  "@a":
    attributes:
      temperature.warmth: { op: add, value: -10 }
      movement.speed: { op: multiply, value: 0.85 }
