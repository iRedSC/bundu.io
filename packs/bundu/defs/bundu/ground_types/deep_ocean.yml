kind: ocean
color: "#0a2f4a"
textures:
    caustics: bundu/effect/ocean_caustics.jpg
    displace: bundu/effect/ocean_displace.png
    ripple_idle: bundu/effect/ocean_ripple.png
    ripple_move: bundu/effect/ocean_ripple_move.png
    foam: bundu/effect/ocean_foam.svg
    sparkle: bundu/effect/ocean_sparkle.svg
---
model: deep_ocean
whenOccupied:
  occupationType: center
  "@a":
    flags:
      - in_water
    attributes:
      movement.speed: { op: multiply, value: 0.5 }
      attack.reach: { op: multiply, value: 0.6 }
      air.oxygen: { op: add, value: -15 }
      temperature.warmth: { op: add, value: -8 }
      thirst.hydration: { op: add, value: 10 }
