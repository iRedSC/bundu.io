kind: solid
color: "#dfe8ed"
fill: forest_blobs
footsteps: true
ambient:
    snow:
        interval_ms: [90, 220]
        count: 2
        size: [20, 40]
        # Bigger flakes stay readable — was nearly invisible after the size bump.
        alpha: [0.72, 0.38]
        lifetime: [2200, 4200]
        speed: [80, 160]
        # Narrow cone into the wind so flakes stream across, not spray everywhere.
        spread: 0.55
        gravity: 10
        gravity_x: 32
        friction: 0.08
        tint: "#f4f8fb"
        alpha_fade_in: 0.08
        alpha_hold: 0.6
---
model: snow
whenOccupied:
  occupationType: center
  "@a":
    attributes:
      temperature.warmth: { op: add, value: -15 }
      movement.speed: { op: multiply, value: 0.9 }
