kind: solid
color: "#b8954a"
fill: forest_blobs
trail:
    amount: [1, 3]
    speed: [30, 90]
    size: [2, 6]
    color_jitter: 0.16
    spacing: 16
ambient:
    dust:
        interval_ms: [110, 280]
        count: 2
        size: [50, 100]
        # Paired with size — bigger = more faint, but still readable while blowing.
        alpha: [0.32, 0.12]
        lifetime: [2000, 3800]
        speed: [90, 180]
        spread: 0.7
        gravity_x: 40
        friction: 0.1
        tint: "#d2b87a"
        alpha_fade_in: 0.1
        alpha_hold: 0.55
---
model: savannah
overheat: true
