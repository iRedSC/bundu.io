health:
  max: 200
  split: true
  icon: bundu/ui/health_bar_icon.svg
  colors:
    base: "#88fa57"
    overlay: "#37ad98"
    diff: "#d4ffe4"
    flash_base: "#ff5555"
    flash_overlay: "#ff8888"
  shake: 3
  # flash when health < 25% of max — client uses ratio 0.25
  flash_below_ratio: 0.25

hunger:
  max: 200
  split: true
  icon: bundu/ui/hunger_bar_icon.svg
  colors:
    base: "#b06b30"
    overlay: "#d48457"
    diff: "#6e5648"
    flash_base: "#ff6633"
    flash_overlay: "#ff9966"
  shake: 3
  flash_below: 25
  # no flash_above for hunger (cancel_regen_above not hooked)

heat:
  max: 200
  split: true
  icon: bundu/ui/heat_bar_icon.svg
  colors:
    base: "#b85a48"
    overlay: "#b02a2a"
    diff: "#5f7b85"
    flash_base: "#4a90d9"
    flash_overlay: "#7eb6ff"
  shake: 4
  flash_below: 25
  flash_above: 175
  # gradient by amount (stops 0-1 of max). Client lerps between stops.
  gradient:
    - { at: 0, base: "#4a90d9", overlay: "#7eb6ff" }
    - { at: 0.5, base: "#b85a48", overlay: "#b02a2a" }
    - { at: 1, base: "#ff4400", overlay: "#ff8800" }

thirst:
  max: 100
  split: false
  icon: bundu/ui/water_bar_icon.svg  # reuse water assets
  colors:
    base: "#3a7ca5"
    overlay: "#5dade2"
    diff: "#1a3a4a"
    flash_base: "#c0392b"
    flash_overlay: "#e74c3c"
  shake: 3
  flash_below: 25
