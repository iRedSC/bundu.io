# Context resources inherit transforms by type. A context may replace its
# texture with `visual: <object-def-id>` to mount an assembled visual instead.
item/type/none:
  abstract: true
  texture: bundu/misc/unknown_asset.svg
  contexts:
    icon: {}
    hand: {}
    body: {}
    world: {}

