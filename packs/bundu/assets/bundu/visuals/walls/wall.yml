id: wall
abstract: true
extends: single_tile_node

# Spike sits under the wall body (`main`). Toggle with `spiked` state.
parts:
  spike:
    zIndex: 9
    visible: false
  main:
    zIndex: 10

states:
  spiked:
    default: false
    values:
      "true":
        parts:
          spike:
            visible: true
  rotting:
    values:
      "true":
        parts:
          spike:
            saturation: 0
