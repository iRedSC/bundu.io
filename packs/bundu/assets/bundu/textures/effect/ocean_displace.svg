<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Displacement map: red = X, green = Y. Mid-gray = no offset. -->
  <defs>
    <linearGradient id="rx" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#804060"/>
      <stop offset="50%" stop-color="#608050"/>
      <stop offset="100%" stop-color="#804060"/>
    </linearGradient>
    <linearGradient id="ry" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#406080"/>
      <stop offset="50%" stop-color="#508060"/>
      <stop offset="100%" stop-color="#406080"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>
  <rect width="256" height="256" fill="#808080"/>
  <g filter="url(#blur)" opacity="0.85">
    <circle cx="64" cy="64" r="48" fill="#c06040"/>
    <circle cx="192" cy="48" r="40" fill="#40a060"/>
    <circle cx="48" cy="180" r="52" fill="#4060c0"/>
    <circle cx="200" cy="200" r="56" fill="#c04080"/>
    <circle cx="128" cy="128" r="44" fill="#60c080"/>
    <circle cx="0" cy="128" r="36" fill="#a06040"/>
    <circle cx="256" cy="128" r="36" fill="#a06040"/>
    <circle cx="128" cy="0" r="36" fill="#4060a0"/>
    <circle cx="128" cy="256" r="36" fill="#4060a0"/>
  </g>
</svg>
