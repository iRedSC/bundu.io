abstract: true
extends: model:bundu:single_tile_node
# skyUndo authors soft undo radius for the shared sky-undo bake.
# Soft fire glow is particles.
parts:
  main:
    zIndex: 0
    spriteScale: 1.5
    shadow: 0.35
  sky_undo:
    spriteScale: 14
    visible: false
    skyUndo: true

animations:
  fire_glow:
    preset: fire_glow
    parts: main
    autoplay: true
