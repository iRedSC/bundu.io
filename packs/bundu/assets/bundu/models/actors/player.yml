id: player
parts:
    leftHand:
        sprite: bundu/entity/player/player_hand.svg
        pivot: { x: 0.75, y: 0 }
        attach: true
        zIndex: 0
        shadow: 1

    rightHand:
        sprite: bundu/entity/player/player_hand.svg
        pivot: { x: -0.75, y: 0 }
        attach: true
        attachAnchor: { x: 1, y: 0.5 }
        zIndex: 1
        shadow: 1

    body:
        sprite: bundu/entity/player/player.svg
        attach: true
        attachAbove: true
        zIndex: 2
        shadow: 1
        spillover: 50

# Example:
# variants:
#   1:
#     body: alternate_player
#     leftHand: alternate_hand
variants: {}

slots:
    mainhand: { part: leftHand, display: hand, scale: 2.5 }
    offhand:
        part: rightHand
        display: hand
        mirrorX: true
        scale: 1.8
    helmet: { part: body, display: body }

animations:
    wave:
        preset: wave
        parts: [leftHand, rightHand, body]
        autoplay: true
    hurt:
        preset: hurt
        parts: [leftHand, rightHand, body]
    attack:
        preset: attack
        parts: [leftHand, rightHand, body]
    block:
        preset: block
        parts: [leftHand, rightHand, body]
    eat:
        preset: eat
        parts: [leftHand, rightHand, body]
