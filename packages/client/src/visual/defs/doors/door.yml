id: door
abstract: true
extends: single_tile_node

states:
  open:
    default: false
    values:
      true:
        parts:
          main:
            alpha: 0.6
            scale: 0.9
  rotting:
    default: false
    values:
      true:
        parts:
          main:
            filters: [grayscale]
        animations: [rotting]

animations:
  rotting:
    preset: rotting
    parts: main
