id: single_tile_node
abstract: true
variantSource: texture
texturePart: main

tile:
  footprint:
    - "X"
  spillover: 0

parts:
  - name: main

animations:
  hit:
    preset: hit
    parts: main
  rotting:
    preset: rotting
    parts: main

states:
  rotting:
    default: false
    values:
      true:
        parts:
          main:
            filters: [grayscale]
        animations: [rotting]
