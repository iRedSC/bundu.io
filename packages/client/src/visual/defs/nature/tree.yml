id: forest_tree
variantSource: structured
defaultVariant: base

tile:
  footprint:
    - "###"
    - "#X#"
    - "###"
  spillover: 0

# Fade canopy when the local player stands under the art.
occlusion:
  state: occluded
  radius: 1.5
alphaFadeMs: 200

# World zIndex bands (player = 1): trunk below, canopy above.
parts:
  - name: layer0
    zIndex: 0
  - name: layer1
    zIndex: 10
  - name: layer2
    zIndex: 11

variants:
  base:
    layer0: forest_tree_1_0
    layer1: forest_tree_1_1
    layer2: forest_tree_1_2

states:
  occluded:
    default: false
    values:
      "true":
        parts:
          layer1: { alpha: 0.35 }
          layer2: { alpha: 0.35 }

animations:
  hit:
    preset: hit
    parts: [layer0, layer1, layer2]
  sway:
    preset: tree_sway
    parts: [layer1, layer2]
    data: { distance: 0.1, tilt: 2, duration: 7500, stagger: 500 }
    autoplay: true
