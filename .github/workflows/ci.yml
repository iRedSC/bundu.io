name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.0"
  REGISTRY: ghcr.io

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Integration smoke test
        run: bun run test:integration

      - name: Test with coverage
        run: bun test --coverage --coverage-reporter=lcov --coverage-reporter=text

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: error

      - name: Build
        run: bun run build

      - name: Assert debug tools stripped from prod bundle
        run: bun run check-prod-debug

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: check
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: containers/frontend/Dockerfile
            build_args: GAME_WS_URL=ws://localhost:7777
          - name: server
            dockerfile: containers/server/Dockerfile
            build_args: ""
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Image name
        id: image
        run: echo "name=${REGISTRY}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')/${{ matrix.name }}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Smoke test frontend image
        if: matrix.name == 'frontend'
        run: |
          container=$(docker run --detach --publish 13000:3000 "${{ steps.image.outputs.name }}:${GITHUB_SHA::7}")
          trap 'docker rm --force "$container"' EXIT
          for attempt in {1..20}; do
            curl --fail --silent --show-error http://127.0.0.1:13000/site/ >/dev/null && exit 0
            sleep 1
          done
          docker logs "$container"
          exit 1

      - name: Smoke test server image
        if: matrix.name == 'server'
        run: |
          container=$(docker run --detach --publish 17778:7777 "${{ steps.image.outputs.name }}:${GITHUB_SHA::7}")
          trap 'docker rm --force "$container"' EXIT
          WS_SMOKE_URL=ws://127.0.0.1:17778 bun run scripts/ci/websocket-smoke.ts
