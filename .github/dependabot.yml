version: 2
updates:
  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      dependencies:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /containers/frontend
      - /containers/server
    schedule:
      interval: weekly
      day: monday
    groups:
      container-images:
        patterns: ["*"]
