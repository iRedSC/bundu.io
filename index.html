<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="packs/bundu/assets/bundu/textures/entity/player/player.svg"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Aoboshi+One&family=Nunito:wght@500&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="public/style.css" />
        <title>Bundu.io</title>
        <script type="module" defer src="packages/client/src/index.ts"></script>
    </head>
    <body>
        <img
            src="packs/bundu/assets/bundu/textures/ui/menu_background.png"
            alt=""
            class="menu-background blur-image menu"
        />
        <div class="centered-content menu">
            <input type="text" id="name-input" placeholder="username" maxlength="24" autocomplete="off" />
            <button id="play-button" class="menu" type="button">Play</button>
        </div>
        <div
            id="loading-screen"
            class="loading-overlay menu hidden"
            aria-live="polite"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
        >
            <p id="loading-title" class="loading-title">Loading…</p>
            <p id="loading-status" class="loading-status"></p>
            <div class="loading-bar" aria-hidden="true">
                <div id="loading-bar-fill" class="loading-bar-fill"></div>
            </div>
        </div>
        <div id="loading-error" class="loading-overlay menu hidden" role="alert">
            <p id="loading-error-title" class="loading-title">Something went wrong</p>
            <p id="loading-error-message" class="loading-status"></p>
            <div class="loading-actions">
                <button id="loading-retry-button" type="button">Retry</button>
                <button id="loading-back-button" type="button">Back to menu</button>
            </div>
        </div>
        <div class="chat-container hidden">
            <input
                type="text"
                id="chat-input"
                autocomplete="off"
                placeholder="chat message"
            />
        </div>
    </body>
</html>
