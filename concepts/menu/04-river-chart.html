<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bundu Menu — River Chart</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --deep: #0b1f2a;
      --water: #12485c;
      --cyan: #39c6c0;
      --foam: #d7f4f1;
      --ink: #e8f7f5;
      --slate: #8fb4bc;
      --panel: rgba(11, 36, 48, 0.78);
      --line: rgba(57, 198, 192, 0.35);
      --warn: #d9a441;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: Sora, sans-serif;
      color: var(--ink);
      background: var(--deep);
      overflow: hidden;
    }
    .scene {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(57,198,192,0.16), transparent 60%),
        linear-gradient(160deg, #0e2a38 0%, #0b1f2a 50%, #123344 100%);
    }
    .wave {
      position: absolute; left: -10%; right: -10%; height: 180px;
      opacity: 0.35;
      background: repeating-linear-gradient(
        -12deg,
        transparent 0 18px,
        rgba(57,198,192,0.18) 18px 20px
      );
      animation: drift 14s linear infinite;
    }
    .wave.a { bottom: 8%; }
    .wave.b { bottom: 0; opacity: 0.2; animation-duration: 22s; animation-direction: reverse; }
    .chart-lines {
      position: absolute; inset: 12% 8% 20% 18%;
      border: 1px dashed rgba(143,180,188,0.25);
      background-image:
        linear-gradient(rgba(143,180,188,0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(143,180,188,0.08) 1px, transparent 1px);
      background-size: 56px 56px;
      pointer-events: none;
    }
    .river-path {
      position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.55;
    }
    .shell {
      position: relative; z-index: 1;
      min-height: 100vh; height: 100%;
      display: grid;
      grid-template-columns: 76px 1fr;
    }
    .rail {
      background: rgba(7, 20, 28, 0.92);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column; gap: 0.2rem;
      padding: 0.85rem 0.4rem;
      animation: fade 0.6s ease-out both;
    }
    .rail a {
      display: grid; place-items: center;
      text-decoration: none;
      color: var(--slate);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 0.7rem 0.2rem;
      gap: 0.3rem;
      border: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .rail a i {
      font-style: normal;
      font-size: 0.95rem;
      color: inherit;
    }
    .rail a.active, .rail a:hover {
      color: var(--cyan);
      border-color: var(--line);
      background: rgba(57,198,192,0.08);
    }
    .main {
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 1rem 1.35rem 1rem;
      min-width: 0;
    }
    .top {
      display: flex; justify-content: space-between; align-items: start; gap: 1rem;
      animation: fade 0.7s ease-out 0.1s both;
    }
    .coords {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      color: var(--slate);
      line-height: 1.5;
    }
    .coords b { color: var(--cyan); font-weight: 700; }
    .right { display: flex; flex-direction: column; align-items: end; gap: 0.55rem; }
    .utility { display: flex; gap: 0.35rem; }
    .utility button {
      font: inherit;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--foam);
      background: transparent;
      border: 1px solid var(--line);
      padding: 0.4rem 0.6rem;
      cursor: pointer;
    }
    .utility button:hover { background: rgba(57,198,192,0.12); color: var(--cyan); }
    .badge {
      width: 260px;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 0.65rem 0.75rem;
      backdrop-filter: blur(6px);
    }
    .badge-row { display: flex; gap: 0.65rem; align-items: center; }
    .avatar {
      width: 40px; height: 40px;
      border: 1px solid var(--cyan);
      display: grid; place-items: center;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      color: var(--cyan);
      background: rgba(57,198,192,0.1);
    }
    .badge strong { display: block; font-size: 0.92rem; }
    .badge small {
      font-family: "JetBrains Mono", monospace;
      color: var(--warn);
      font-size: 0.7rem;
      letter-spacing: 0.04em;
    }
    .xp {
      margin-top: 0.5rem; height: 6px;
      background: rgba(0,0,0,0.35);
      overflow: hidden;
    }
    .xp i {
      display: block; height: 100%; width: 77%;
      background: linear-gradient(90deg, #1f8f8a, var(--cyan));
      animation: grow 1s ease-out 0.3s both;
      transform-origin: left;
    }
    .stage {
      display: grid;
      place-items: center;
      padding: 0.5rem 0;
    }
    .panel {
      width: min(560px, 94%);
      animation: rise 0.75s ease-out 0.15s both;
    }
    .brand-row {
      display: flex; align-items: baseline; justify-content: space-between;
      gap: 1rem; margin-bottom: 0.35rem;
    }
    .brand {
      font-size: clamp(3.2rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--foam);
    }
    .brand em {
      font-style: normal;
      color: var(--cyan);
    }
    .chip {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
      color: var(--cyan);
      border: 1px solid var(--line);
      padding: 0.3rem 0.5rem;
      white-space: nowrap;
      animation: blink 2.4s steps(2, end) infinite;
    }
    .tag {
      color: var(--slate);
      font-size: 0.98rem;
      margin-bottom: 1.35rem;
      max-width: 36ch;
    }
    .join {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.45rem;
      margin-bottom: 1rem;
    }
    .join input {
      font: inherit; font-weight: 600;
      background: rgba(7,20,28,0.8);
      border: 1px solid var(--line);
      color: var(--ink);
      padding: 0.85rem 0.95rem;
      outline: none;
    }
    .join input:focus { border-color: var(--cyan); }
    .play {
      font: inherit; font-weight: 800;
      letter-spacing: 0.04em;
      background: var(--cyan);
      color: #062229;
      border: none;
      padding: 0 1.4rem;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
    }
    .play:hover { transform: translateY(-2px); filter: brightness(1.08); }
    .selectors {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 0.7rem;
    }
    .field {
      background: var(--panel);
      border: 1px solid rgba(143,180,188,0.22);
      padding: 0.75rem;
    }
    .field label {
      display: block;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--slate);
      margin-bottom: 0.4rem;
    }
    select {
      width: 100%;
      font: inherit; font-weight: 600; font-size: 0.9rem;
      background: rgba(7,20,28,0.85);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 0.65rem 0.7rem;
      cursor: pointer;
    }
    .modes { display: grid; gap: 0.3rem; }
    .mode {
      font: inherit; font-size: 0.8rem; font-weight: 700;
      text-align: left;
      color: var(--slate);
      background: transparent;
      border: 1px solid transparent;
      padding: 0.45rem 0.5rem;
      cursor: pointer;
    }
    .mode:hover { color: var(--ink); border-color: rgba(143,180,188,0.25); }
    .mode.active {
      color: #062229;
      background: var(--cyan);
      border-color: var(--cyan);
    }
    .foot {
      display: flex; justify-content: space-between;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.68rem;
      color: var(--slate);
      animation: fade 0.8s ease-out 0.25s both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: none; }
    }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    @keyframes grow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes drift {
      from { transform: translateX(0); }
      to { transform: translateX(40px); }
    }
    @keyframes blink {
      50% { opacity: 0.45; }
    }
    @media (max-width: 820px) {
      .shell { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
      .rail { order: 2; flex-direction: row; justify-content: space-around; border-right: none; border-top: 1px solid var(--line); }
      .selectors { grid-template-columns: 1fr; }
      .top { flex-direction: column; }
      .right { align-items: stretch; }
      .badge { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="scene" aria-hidden="true">
    <div class="chart-lines"></div>
    <svg class="river-path" viewBox="0 0 1440 900" preserveAspectRatio="none">
      <path d="M-40 640 C180 560 260 720 480 640 C700 560 820 700 1040 620 C1220 560 1340 680 1480 600" fill="none" stroke="#39c6c0" stroke-width="3" stroke-dasharray="8 10">
        <animate attributeName="stroke-dashoffset" from="0" to="-72" dur="4s" repeatCount="indefinite"/>
      </path>
      <path d="M-40 700 C200 640 300 780 520 700 C760 610 880 760 1120 680 C1280 630 1380 720 1480 680" fill="none" stroke="#1f8f8a" stroke-width="2" opacity="0.6"/>
    </svg>
    <div class="wave a"></div>
    <div class="wave b"></div>
  </div>

  <div class="shell">
    <nav class="rail" aria-label="Main">
      <a class="active" href="#play"><i>▸</i>Play</a>
      <a href="#cosmetics"><i>◇</i>Skin</a>
      <a href="#settings"><i>≡</i>Set</a>
      <a href="#account"><i>○</i>Acct</a>
      <a href="#store"><i>□</i>Shop</a>
    </nav>

    <div class="main">
      <header class="top">
        <div class="coords">
          LAT <b>34.12 N</b><br />
          LON <b>118.04 W</b><br />
          FLOW <b>STABLE</b>
        </div>
        <div class="right">
          <div class="utility">
            <button type="button">Wiki</button>
            <button type="button">Socials</button>
            <button type="button">Changelog</button>
          </div>
          <aside class="badge" aria-label="Account">
            <div class="badge-row">
              <div class="avatar">R</div>
              <div>
                <strong>Redstone</strong>
                <small>LVL 24 // 1840 XP</small>
              </div>
            </div>
            <div class="xp" aria-label="Level progress"><i></i></div>
          </aside>
        </div>
      </header>

      <main class="stage">
        <div class="panel">
          <div class="brand-row">
            <h1 class="brand">BUN<em>DU</em></h1>
            <span class="chip">LIVE CHART</span>
          </div>
          <p class="tag">Plot a current. Drop in where the river widens.</p>
          <div class="join">
            <input type="text" placeholder="Operator name" maxlength="24" value="Drift" />
            <button class="play" type="button">PLAY</button>
          </div>
          <div class="selectors">
            <div class="field">
              <label for="server">Server node</label>
              <select id="server">
                <option>NA — Blue Fen Relay</option>
                <option>EU — Tide Lock</option>
                <option>APAC — Delta Stack</option>
              </select>
            </div>
            <div class="field">
              <label>Game type</label>
              <div class="modes" role="group">
                <button class="mode active" type="button">Normal</button>
                <button class="mode" type="button">Survival Games</button>
                <button class="mode" type="button">Community</button>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer class="foot">
        <span>CANDIDATE 04 // RIVER CHART</span>
        <span>NAV MENU CONCEPT</span>
      </footer>
    </div>
  </div>
  <script>
    document.querySelectorAll(".mode").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".mode").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
      });
    });
  </script>
</body>
</html>
